<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tra Cứu Điểm Thi Lớp 10 Nghệ An 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --primary: #667eea;
    --primary-dark: #764ba2;
    --accent: #f093fb;
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 20px;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    background: linear-gradient(150deg, #667eea 0%, #764ba2 55%, #f093fb 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 40px;
  }

  .container { width: 100%; max-width: 480px; }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeDown 0.5s ease;
  }
  .header .emoji-big { font-size: 52px; display: block; margin-bottom: 8px; }
  .header h1 {
    color: white;
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 800;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    line-height: 1.3;
  }
  .header p { color: rgba(255,255,255,0.8); margin-top: 6px; font-size: 13px; }

  /* ===== CARD BASE ===== */
  .card {
    background: white;
    border-radius: var(--radius-lg);
    padding: 20px 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease;
  }

  /* ===== Ô TRA CỨU ===== */
  .search-wrap { display: flex; flex-direction: column; gap: 10px; }

  .search-input-row { display: flex; gap: 8px; align-items: stretch; }

  .search-input-row input {
    flex: 1;
    padding: 14px 16px;
    border: 2.5px solid #e0e0e0;
    border-radius: var(--radius-sm);
    font-size: 17px;
    font-family: inherit;
    font-weight: 700;
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    color: #222;
    /* tránh zoom trên iOS khi focus */
    -webkit-text-size-adjust: 100%;
  }
  .search-input-row input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(102,126,234,0.18);
  }
  .search-input-row input::placeholder {
    letter-spacing: 0; font-weight: 400; color: #bbb; font-size: 14px;
  }

  .btn-search {
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    /* minimum touch target */
    min-height: 48px;
    min-width: 48px;
  }
  .btn-search:active { transform: scale(0.96); opacity: 0.85; }
  .btn-search:disabled { opacity: 0.5; pointer-events: none; }

  /* ===== CARD THỦ KHOA ===== */
  #thuKhoaCard {
    background: white;
    border-radius: var(--radius-lg);
    padding: 18px 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease 0.1s both;
    transition: max-height 0.4s ease, opacity 0.35s ease, padding 0.35s ease, margin 0.35s ease;
    overflow: hidden;
    max-height: 600px;
  }
  #thuKhoaCard.hidden {
    max-height: 0;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
    margin-bottom: 0;
    pointer-events: none;
  }

  .tk-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .tk-header .tk-title { font-size: 15px; font-weight: 800; color: #222; }
  .tk-header .tk-sub { font-size: 11px; color: #aaa; margin-left: auto; }

  .tk-list { display: flex; flex-direction: column; gap: 8px; }

  .tk-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-md);
  }
  .tk-item.rank1 { background: linear-gradient(135deg, #fff8e1, #ffe082); border: 2px solid #ffd54f; }
  .tk-item.rank2 { background: linear-gradient(135deg, #f5f5f5, #e0e0e0); border: 2px solid #bdbdbd; }
  .tk-item.rank3 { background: linear-gradient(135deg, #fbe9e7, #ffccbc); border: 2px solid #ffab91; }

  .tk-medal { font-size: 26px; flex-shrink: 0; line-height: 1; }

  .tk-info { flex: 1; min-width: 0; }
  .tk-info .tk-sbd {
    font-size: 11px; color: #777; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tk-info .tk-label { font-size: 13px; font-weight: 800; color: #222; margin: 1px 0 4px; }
  .tk-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tk-tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 20px; background: rgba(255,255,255,0.75); color: #555;
    white-space: nowrap;
  }

  .tk-score-box { text-align: right; flex-shrink: 0; }
  .tk-score { font-size: 26px; font-weight: 800; line-height: 1; }
  .tk-item.rank1 .tk-score { color: #d97706; }
  .tk-item.rank2 .tk-score { color: #6b7280; }
  .tk-item.rank3 .tk-score { color: #ea580c; }
  .tk-score-label { font-size: 10px; color: #aaa; margin-top: 2px; }

  /* ===== KẾT QUẢ ===== */
  #result { display: none; }

  .student-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; padding-bottom: 16px;
    border-bottom: 2px dashed #f0f0f0;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .student-info h2 { font-size: 18px; color: #222; font-weight: 800; }
  .student-info span { font-size: 12px; color: #999; line-height: 1.4; display: block; margin-top: 2px; }

  /* Grid điểm: 3 cột trên mobile */
  .scores-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .score-box { border-radius: var(--radius-sm); padding: 14px 8px; text-align: center; }
  .score-box.van  { background: linear-gradient(135deg, #f093fb18, #f093fb33); border: 2px solid #f093fb; }
  .score-box.nn   { background: linear-gradient(135deg, #4facfe18, #4facfe33); border: 2px solid #4facfe; }
  .score-box.toan { background: linear-gradient(135deg, #43e97b18, #43e97b33); border: 2px solid #43e97b; }
  .score-box.vang { background: #f8f8f8; border: 2px dashed #ddd; }

  .score-box .mon {
    font-size: 10px; font-weight: 700; color: #777;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .score-box .diem { font-size: 28px; font-weight: 800; line-height: 1; color: #222; }
  .score-box.van  .diem { color: #c026d3; }
  .score-box.nn   .diem { color: #0284c7; }
  .score-box.toan .diem { color: #16a34a; }
  .score-box.vang .diem { font-size: 20px; color: #ccc; }
  .score-box .slabel { font-size: 10px; color: #bbb; margin-top: 3px; }

  /* Tổng điểm */
  .total-box {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: var(--radius-md);
    padding: 18px 16px;
    text-align: center;
    color: white;
    margin-bottom: 12px;
  }
  .total-label { font-size: 11px; opacity: 0.8; letter-spacing: 1px; margin-bottom: 4px; }
  .total-score { font-size: 48px; font-weight: 800; line-height: 1; }
  .total-note { font-size: 11px; opacity: 0.65; margin-top: 6px; }

  /* Rank */
  .rank-box {
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .rank-icon { font-size: 32px; flex-shrink: 0; }
  .rank-text { font-size: 14px; font-weight: 700; color: #92400e; }
  .rank-sub { font-size: 12px; color: #b45309; margin-top: 2px; }

  /* AI box */
  .ai-box {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .ai-box::before {
    content: '🤖'; position: absolute; right: -8px; top: -8px;
    font-size: 70px; opacity: 0.07; pointer-events: none;
  }
  .ai-label { font-size: 10px; color: #a78bfa; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
  .ai-text { color: #e2e8f0; font-size: 14px; line-height: 1.75; }
  .ai-typing { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
  .ai-typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #a78bfa;
    animation: typing 1.2s infinite;
  }
  .ai-typing span:nth-child(2) { animation-delay: 0.2s; }
  .ai-typing span:nth-child(3) { animation-delay: 0.4s; }

  /* Danh sách trường */
  .schools-title { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 8px; margin-top: 4px; }
  .school-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
  }
  .school-item.dau { background: #f0fdf4; border-left: 4px solid #22c55e; }
  .school-item.sat { background: #fffbeb; border-left: 4px solid #f59e0b; }
  .school-item.kho { background: #fef2f2; border-left: 4px solid #ef4444; }
  .school-name { font-size: 13px; font-weight: 700; color: #222; }
  .school-meta { font-size: 11px; color: #999; margin-top: 2px; }
  .school-badge {
    font-size: 10px; font-weight: 700; padding: 4px 8px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .dau .school-badge { background: #dcfce7; color: #15803d; }
  .sat .school-badge { background: #fef3c7; color: #92400e; }
  .kho .school-badge { background: #fee2e2; color: #b91c1c; }

  .not-found {
    text-align: center; padding: 20px 16px;
    color: #ef4444; font-weight: 700; font-size: 14px;
  }
  .not-found small { display: block; color: #aaa; font-weight: 400; margin-top: 6px; font-size: 12px; }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    margin-top: 8px;
    padding: 0 8px;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-7px); }
  }
  @keyframes pop {
    0%   { transform: scale(0.85); opacity: 0; }
    70%  { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.45s ease forwards; }

  /* ===== RESPONSIVE: tablet trở lên ===== */
  @media (min-width: 540px) {
    body { padding: 32px 20px 48px; }
    .container { max-width: 560px; }
    .card { padding: 24px 22px; }
    #thuKhoaCard { padding: 20px 22px; }
    .search-wrap { flex-direction: row; }
    .search-input-row { flex: 1; }
    .header .emoji-big { font-size: 60px; }
    .header h1 { font-size: 26px; }
    .score-box .diem { font-size: 32px; }
    .tk-score { font-size: 28px; }
    .total-score { font-size: 52px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <span class="emoji-big">🎓</span>
    <h1>Tra Cứu Điểm Thi<br>Tuyển Sinh Lớp 10 Nghệ An 2026</h1>
    <p>Nhập SBD để xem điểm + AI dự đoán trường 👇</p>
  </div>

  <!-- Ô TRA CỨU -->
  <div class="card">
    <div class="search-wrap">
      <div class="search-input-row">
        <input
          type="text"
          id="sbdInput"
          placeholder="Nhập số báo danh..."
          maxlength="12"
          inputmode="numeric"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') search()"
        >
        <button class="btn-search" id="btnSearch" onclick="search()">🔍 Tra cứu</button>
      </div>
    </div>
  </div>

  <!-- CARD THỦ KHOA -->
  <div id="thuKhoaCard">
    <div class="tk-header">
      <span style="font-size:20px">🏆</span>
      <span class="tk-title">Thủ Khoa 2026</span>
      <span class="tk-sub">Top 3 toàn tỉnh</span>
    </div>
    <div class="tk-list" id="tkList">
      <div style="text-align:center;color:#ccc;padding:14px;font-size:13px">⏳ Đang tải dữ liệu...</div>
    </div>
  </div>

  <!-- KẾT QUẢ -->
  <div class="card" id="result">
    <div id="resultContent"></div>
  </div>

  <div class="footer">Dữ liệu từ Sở GD&ĐT Nghệ An • AI dự đoán mang tính tham khảo</div>
</div>

<script>
const API_URL = "https://llm.thesparkdaily.com/v1/chat/completions";
const API_KEY = "sk-XI0oMcxPtA-180oOH1N4OA";
const MODEL   = "deepseek-v4-flash";

let diemThiData   = null;
let diemChuanData = null;

async function loadData() {
  try {
    const [r1, r2] = await Promise.all([
      fetch("diem-tuyen-sinh-10-2026.json"),
      fetch("diem-chuan-cac-truong-thpt-qua-tung-nam.json")
    ]);
    const j1 = await r1.json();
    const j2 = await r2.json();

    const arr = j1.du_lieu_thi ?? j1;
    diemThiData = {};
    arr.forEach(item => { diemThiData[String(item.sbd)] = item; });

    diemChuanData = j2.diem_chuan_thpt_nghe_an?.du_lieu ?? j2.du_lieu ?? j2;
    renderThuKhoa();
  } catch(e) {
    console.error("❌ Lỗi load data:", e);
    document.getElementById("tkList").innerHTML =
      `<div style="text-align:center;color:#ef4444;padding:14px;font-size:13px">❌ Không tải được dữ liệu</div>`;
  }
}
loadData();

function renderThuKhoa() {
  if (!diemThiData) return;
  const medals = ["🥇","🥈","🥉"];
  const cls    = ["rank1","rank2","rank3"];
  const labels = ["Thủ khoa","Á khoa","Hạng Ba"];

  const sorted = Object.values(diemThiData)
    .map(ts => ({
      sbd:  String(ts.sbd),
      ma_hd: ts.ma_hd ?? "—",
      van:  ts.diem_van,
      nn:   ts.diem_nn,
      toan: ts.diem_toan,
      tong: Math.round(((ts.diem_van ?? 0) + (ts.diem_nn ?? 0) + (ts.diem_toan ?? 0)) * 100) / 100
    }))
    .sort((a, b) => b.tong - a.tong)
    .slice(0, 3);

  document.getElementById("tkList").innerHTML = sorted.map((ts, i) => `
    <div class="tk-item ${cls[i]} pop" style="animation-delay:${i*0.1}s">
      <div class="tk-medal">${medals[i]}</div>
      <div class="tk-info">
        <div class="tk-sbd">SBD: ${ts.sbd} • HĐ: ${ts.ma_hd}</div>
        <div class="tk-label">${labels[i]}</div>
        <div class="tk-tags">
          <span class="tk-tag">📖 ${ts.van ?? "Vắng"}</span>
          <span class="tk-tag">🌐 ${ts.nn ?? "Vắng"}</span>
          <span class="tk-tag">📐 ${ts.toan ?? "Vắng"}</span>
        </div>
      </div>
      <div class="tk-score-box">
        <div class="tk-score">${ts.tong}</div>
        <div class="tk-score-label">điểm</div>
      </div>
    </div>
  `).join("");
}

function duDoanDC(truong) {
  const dc2026 = truong["2026"]?.diem_chuan;
  if (dc2026 && dc2026 !== "chưa có") return { diem: dc2026, nguon: "2026" };
  const dc2025 = truong["2025"]?.diem_chuan;
  const dc2024 = truong["2024"]?.diem_chuan;
  const dc2023 = truong["2023"]?.diem_chuan;
  const valid = v => v && v !== "chưa có";
  if (valid(dc2025) && valid(dc2024)) {
    const du = Math.round((dc2025 + (dc2025 - dc2024) * 0.5) * 100) / 100;
    return { diem: du, nguon: "dự đoán 2024–2025" };
  }
  if (valid(dc2025)) return { diem: dc2025, nguon: "2025" };
  if (valid(dc2024)) return { diem: dc2024, nguon: "2024" };
  if (valid(dc2023)) return { diem: dc2023, nguon: "2023" };
  return null;
}

function tinhRank(tongDiem) {
  if (!diemThiData) return { rank: "?", total: "?" };
  const all = Object.values(diemThiData)
    .map(d => (d.diem_van ?? 0) + (d.diem_nn ?? 0) + (d.diem_toan ?? 0))
    .sort((a, b) => b - a);
  return { rank: all.findIndex(d => d <= tongDiem) + 1, total: all.length };
}

async function goiAI(info) {
  const { sbd, diem_van, diem_nn, diem_toan, tong, rank, total, truongDau, truongSat, truongKho, soVang } = info;
  const prompt = `Bạn là AI cà khịa nhưng vẫn động viên học sinh vừa tra điểm thi tuyển sinh lớp 10 Nghệ An 2026.

Thông tin thí sinh SBD ${sbd}:
- Điểm Văn: ${diem_van ?? "Vắng"}, Ngoại Ngữ: ${diem_nn ?? "Vắng"}, Toán: ${diem_toan ?? "Vắng"}
- Tổng: ${tong} | Xếp hạng: Top ${rank}/${total} | Vắng: ${soVang} môn
- Đậu: ${truongDau.map(t=>t.ten).join(", ")||"không rõ"}
- Sát: ${truongSat.map(t=>t.ten).join(", ")||"không có"}
- Khó: ${truongKho.map(t=>t.ten).join(", ")||"không có"}

Viết 3-4 câu: cà khịa hài hước GenZ nhưng có động viên, nhận xét điểm từng môn. Tiếng Việt tự nhiên, có emoji. KHÔNG dùng markdown.`;

  return fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
    body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: prompt }], max_tokens: 400, stream: true })
  });
}

async function search() {
  const sbd = document.getElementById("sbdInput").value.trim();
  if (!sbd) return;
  if (!diemThiData) { alert("Đang tải dữ liệu, thử lại nhé!"); return; }

  const btn = document.getElementById("btnSearch");
  btn.disabled = true;
  btn.textContent = "⏳";

  // Ẩn card thủ khoa
  document.getElementById("thuKhoaCard").classList.add("hidden");

  const resultDiv  = document.getElementById("result");
  const contentDiv = document.getElementById("resultContent");
  resultDiv.style.display = "block";

  const ts = diemThiData[sbd];
  if (!ts) {
    contentDiv.innerHTML = `
      <div class="not-found">
        😅 Không tìm thấy SBD <strong>${sbd}</strong>
        <small>Kiểm tra lại số báo danh nhé!</small>
      </div>`;
    btn.disabled = false; btn.textContent = "🔍 Tra cứu";
    return;
  }

  const van  = ts.diem_van;
  const nn   = ts.diem_nn;
  const toan = ts.diem_toan;
  const soVang = [van, nn, toan].filter(d => d == null).length;
  const tong = Math.round(((van ?? 0) + (nn ?? 0) + (toan ?? 0)) * 100) / 100;
  const { rank, total } = tinhRank(tong);

  const truongDau = [], truongSat = [], truongKho = [];
  diemChuanData.forEach(t => {
    const dd = duDoanDC(t);
    if (!dd) return;
    const diff = tong - dd.diem;
    const obj = { ten: t.ten_truong, dc: dd.diem, nguon: dd.nguon, diff };
    if (diff >= 1)       truongDau.push(obj);
    else if (diff >= -1) truongSat.push(obj);
    else                 truongKho.push(obj);
  });
  truongDau.sort((a,b) => b.dc - a.dc);
  truongSat.sort((a,b) => Math.abs(a.diff) - Math.abs(b.diff));
  truongKho.sort((a,b) => b.dc - a.dc);

  const scoreBox = (cls, mon, diem) => diem == null
    ? `<div class="score-box vang"><div class="mon">${mon}</div><div class="diem">😴</div><div class="slabel">Vắng thi</div></div>`
    : `<div class="score-box ${cls} pop"><div class="mon">${mon}</div><div class="diem">${diem}</div><div class="slabel">điểm</div></div>`;

  const schoolList = (arr, cls, badge) => arr.slice(0, 4).map(s => `
    <div class="school-item ${cls}">
      <div>
        <div class="school-name">${s.ten}</div>
        <div class="school-meta">Dự đoán: ${s.dc} điểm (${s.nguon})</div>
      </div>
      <span class="school-badge">${badge}</span>
    </div>`).join("");

  const rankIcon = rank <= 10 ? "🏆" : rank <= 50 ? "🥈" : rank <= 200 ? "🥉" : "📊";
  const pct = Math.round((1 - rank / total) * 100);

  contentDiv.innerHTML = `
    <div class="student-header">
      <div class="avatar">🎒</div>
      <div class="student-info">
        <h2>SBD: ${sbd}</h2>
        <span>Hội đồng: ${ts.ma_hd} • Kết quả 2026</span>
      </div>
    </div>

    <div class="scores-grid">
      ${scoreBox("van",  "Ngữ Văn",   van)}
      ${scoreBox("nn",   "Ngoại Ngữ", nn)}
      ${scoreBox("toan", "Toán",      toan)}
    </div>

    <div class="total-box pop">
      <div class="total-label">TỔNG ĐIỂM${soVang > 0 ? ` (${3-soVang} môn)` : ""}</div>
      <div class="total-score">${tong}</div>
      ${soVang > 0 ? `<div class="total-note">⚠️ Vắng ${soVang} môn — chỉ tính môn có mặt</div>` : ""}
    </div>

    <div class="rank-box pop">
      <div class="rank-icon">${rankIcon}</div>
      <div>
        <div class="rank-text">Top ${rank} / ${total} thí sinh</div>
        <div class="rank-sub">Cao hơn ${pct}% thí sinh 📈</div>
      </div>
    </div>

    <div class="ai-box">
      <div class="ai-label">🤖 AI NÓI GÌ NÀO...</div>
      <div class="ai-text" id="aiText">
        <div class="ai-typing"><span></span><span></span><span></span></div>
      </div>
    </div>

    ${truongDau.length ? `<div class="schools-title">🟢 Có thể đậu</div>${schoolList(truongDau,"dau","✅ Khả năng cao")}` : ""}
    ${truongSat.length ? `<div class="schools-title">🟡 Sát sao (±1 điểm)</div>${schoolList(truongSat,"sat","⚡ Cần theo dõi")}` : ""}
    ${truongKho.length ? `<div class="schools-title">🔴 Khó đậu hơn</div>${schoolList(truongKho.slice(0,3),"kho","❌ Cần cân nhắc")}` : ""}
  `;

  // Stream AI
  try {
    const res = await goiAI({ sbd, diem_van: van, diem_nn: nn, diem_toan: toan, tong, rank, total, truongDau, truongSat, truongKho, soVang });
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    const aiEl    = document.getElementById("aiText");
    aiEl.innerHTML = "";
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") break;
        try {
          const chunk = JSON.parse(data).choices?.[0]?.delta?.content ?? "";
          aiEl.innerHTML += chunk.replace(/\n/g, "<br>");
        } catch {}
      }
    }
  } catch {
    document.getElementById("aiText").innerHTML = "😅 AI đang bận, thử lại sau nhé!";
  }

  btn.disabled = false;
  btn.textContent = "🔍 Tra cứu";
  resultDiv.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>
</body>
</html>
